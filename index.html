<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Hole</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
        overflow: hidden;
        height: 100%;
        width: 100%;
        font-family: -apple-system, system-ui, sans-serif;
        color: #ccc;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #hud {
        position: fixed;
        bottom: 8px;
        left: 8px;
        font-size: 12px;
        opacity: 0.6;
        pointer-events: none;
        text-shadow: 0 0 4px #000;
      }
      #controls {
        position: fixed;
        top: 8px;
        left: 8px;
        min-width: 160px;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(8px);
        color: rgba(255, 255, 255, 0.84);
        font-size: 12px;
        line-height: 1.5;
        user-select: none;
      }
      #controls .title {
        margin-bottom: 6px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: rgba(255, 255, 255, 0.95);
      }
      #controls label {
        display: flex;
        align-items: center;
        gap: 7px;
        cursor: pointer;
        white-space: nowrap;
      }
      #controls input {
        margin: 0;
        accent-color: #9ecbff;
      }
      #fps {
        position: fixed;
        top: 8px;
        right: 8px;
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        opacity: 0.7;
        pointer-events: none;
        text-shadow: 0 0 4px #000;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <canvas id="gl"></canvas>
    <div id="controls">
      <div class="title">Black Hole Controls</div>
      <label><input id="toggle-bloom" type="checkbox" checked /> Bloom</label>
      <label><input id="toggle-disk" type="checkbox" checked /> Accretion disk</label>
      <label><input id="toggle-photon-ring" type="checkbox" checked /> Photon ring</label>
      <label><input id="toggle-jets" type="checkbox" checked /> Relativistic jets</label>
      <label><input id="toggle-nebulae" type="checkbox" checked /> Nebulae / galaxies</label>
    </div>
    <div id="hud">drag: orbit · wheel: zoom</div>
    <div id="fps">— fps</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
